apiVersion: apps/v1
kind: Deployment

metadata:
  name: postgres
  namespace: of-fiap

spec:
  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres

    spec:
      containers:
        - name: postgres

          image: postgres:16

          ports:
            - containerPort: 5432

          env:
            - name: POSTGRES_DB
              value: oficina

            - name: POSTGRES_USER
              value: oficina

            - name: POSTGRES_PASSWORD
              value: oficina

          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"

            limits:
              memory: "512Mi"
              cpu: "500m"