apiVersion: apps/v1
kind: Deployment

metadata:
  name: spring-api
  namespace: of-fiap

spec:
  replicas: 2

  selector:
    matchLabels:
      app: spring-api

  template:
    metadata:
      labels:
        app: spring-api

    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:

        - name: spring-api

          image: IMAGE_NAME

          imagePullPolicy: Always

          ports:
            - containerPort: 8080

          envFrom:

            - configMapRef:
                name: spring-api-config

            - secretRef:
                name: spring-api-secret

          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"

            limits:
              memory: "512Mi"
              cpu: "500m"

          readinessProbe:

            httpGet:
              path: /actuator/health/readiness
              port: 8080

            initialDelaySeconds: 120
            periodSeconds: 10

          livenessProbe:

            httpGet:
              path: /actuator/health/liveness
              port: 8080

            initialDelaySeconds: 180
            periodSeconds: 20