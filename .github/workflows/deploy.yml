name: Oficina FIAP CI-CD

on:
  push:
    branches:
      - main

  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/spring-api:${{ github.sha }}

jobs:

  build-test-package:

    runs-on:
      - self-hosted
      - windows
      - of-fiap-1

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-

      - name: Build + Tests
        run: mvn clean verify

      - name: Publicar artefato
        uses: actions/upload-artifact@v4
        with:
          name: spring-jar
          path: target/*.jar

  docker-build-push:

    needs: build-test-package

    runs-on:
      - self-hosted
      - windows
      - of-fiap-1

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ env.IMAGE_NAME }} .

      - name: Push Docker Image
        run: |
          docker push ${{ env.IMAGE_NAME }}

  deploy-kubernetes:

    needs: docker-build-push

    runs-on:
      - self-hosted
      - windows
      - of-fiap-1

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Verificar cluster
        run: |
          kubectl get nodes

      - name: Criar namespace
        run: |
          kubectl apply -f k8s/namespace.yaml

      - name: Aplicar ConfigMap
        run: |
          kubectl apply -f k8s/configmap.yaml
          
      - name: Aplicar Secret
        run: |
          kubectl apply -f k8s/secrets.yaml

      - name: Deploy PostgreSQL
        run: |
          kubectl apply -f k8s/postgres-deployment.yaml

      - name: Expor PostgreSQL
        run: |
          kubectl apply -f k8s/postgres-service.yaml

      - name: Aguardar PostgreSQL
        run: |
          kubectl rollout status deployment/postgres -n of-fiap --timeout=300s
          
      - name: Atualizar imagem da aplicação
        shell: powershell
        run: |
          (Get-Content k8s/app-deployment.yaml) `
          -replace 'IMAGE_NAME','${{ env.IMAGE_NAME }}' |
          Set-Content k8s/app-deployment-generated.yaml

      - name: Deploy aplicação
        run: |
          kubectl apply -f k8s/app-deployment-generated.yaml

      - name: Expor aplicação
        run: |
          kubectl apply -f k8s/app-service.yaml
          
      - name: Aguardar rollout
        run: |
          kubectl rollout status deployment/spring-api -n of-fiap

      - name: Exibir recursos
        run: |
          kubectl get all
