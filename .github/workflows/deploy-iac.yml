name: Oficina FIAP CI-CD

on:
  push:
    branches:
      - iac

  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/spring-api:${{ github.sha }}

jobs:

  build-test-package:

    runs-on:
      - self-hosted
      - windows
      - of-fiap-1

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-

      - name: Build + Tests
        run: mvn clean verify

      - name: Publicar artefato
        uses: actions/upload-artifact@v4
        with:
          name: spring-jar
          path: target/*.jar

  docker-build-push:

    needs: build-test-package

    runs-on:
      - self-hosted
      - windows
      - of-fiap-1

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ env.IMAGE_NAME }} .

      - name: Push Docker Image
        run: |
          docker push ${{ env.IMAGE_NAME }}

      - name: Exibir imagem gerada
        run: |
          echo ${{ env.IMAGE_NAME }}

  terraform-deploy:

    needs: docker-build-push

    runs-on:
      - self-hosted
      - windows
      - of-fiap-1

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Verificar cluster
        run: |
          kubectl get nodes

      - name: Verificar Terraform
        run: |
          terraform version

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init

      - name: Terraform Validate
        working-directory: terraform
        run: |
          terraform validate

      - name: Terraform Plan
        working-directory: terraform
        shell: powershell
        run: |
          terraform plan `
            -var="image_name=${{ env.IMAGE_NAME }}" `
            -var="ghcr_username=${{ secrets.GHCR_USERNAME }}" `
            -var="ghcr_token=${{ secrets.GHCR_TOKEN }}"

      - name: Terraform Apply
        working-directory: terraform
        shell: powershell
        run: |
          terraform apply -auto-approve `
            -var="image_name=${{ env.IMAGE_NAME }}" `
            -var="ghcr_username=${{ secrets.GHCR_USERNAME }}" `
            -var="ghcr_token=${{ secrets.GHCR_TOKEN }}"

      - name: Aguardar rollout
        run: |
          kubectl rollout status deployment/spring-api -n of-fiap --timeout=300s

      - name: Mostrar imagem implantada
        shell: powershell
        run: |
          kubectl get deployment spring-api `
            -n of-fiap `
            -o jsonpath="{.spec.template.spec.containers[0].image}"

      - name: Exibir recursos
        run: |
          kubectl get all -n of-fiap
