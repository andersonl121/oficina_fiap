  <path class="rel" d="M535 355 V430"/>
  <text class="rel-text" x="485" y="395">chama</text>

  <path class="rel" d="M680 495 H755"/>
  <text class="rel-text" x="717" y="475">aplica regras</text>

  <path class="rel" d="M985 495 H1015"/>
  <text class="rel-text" x="1000" y="475">mapeia</text>

  <path class="rel" d="M550 560 V640"/>
  <text class="rel-text" x="500" y="604">persiste</text>

  <path class="rel" d="M680 695 H1050"/>
  <text class="rel-text" x="865" y="675">JDBC</text>

  <path class="rel" d="M840 355 C810 390 800 405 790 430"/>
