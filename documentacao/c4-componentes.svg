  <text class="label" x="550" y="525">Cliente, Veiculo, Servico,</text>
  <text class="label" x="550" y="546">Estoque, OS e Auth</text>

  <rect class="domain" x="755" y="430" width="230" height="130"/>
  <text class="type" x="870" y="462">Componente</text>
